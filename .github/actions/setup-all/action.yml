# 一键装好 miloco 全栈构建/测试所需工具链：uv（Python）+ pnpm + Node。
# 供 ci.yml 各 job 复用，保持工具链安装步骤单一来源。
name: setup-all
description: 安装 uv + pnpm + Node 并启用依赖缓存

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          backend/uv.lock
          cli/uv.lock

    - uses: pnpm/action-setup@v6
      with:
        version: 11

    - uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: |
          web/pnpm-lock.yaml
          plugins/openclaw/pnpm-lock.yaml
