# 主 CI 门禁：PR / push main 时跑 test + lint + build。
# 按模块拆成并行 job，全量跑（不按变更范围筛选）。
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── workflow-sanity：workflow YAML 不许有 tab（YAML 缩进必须空格）──
  workflow-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 检查 workflow YAML 无 tab 缩进
        run: |
          if grep -Pnl '\t' .github/workflows/*.yml; then
            echo "::error::上述 workflow 文件含 tab，请改用空格缩进"
            exit 1
          fi
          echo "✓ 无 tab"

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: 安装系统依赖（音视频处理）
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: backend miloco 测试
        run: cd backend && uv sync --all-packages && uv run pytest -v

  cli-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: cli/uv.lock
      - name: cli 测试
        run: cd cli && uv sync && uv run pytest -v

  plugin-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-all
      - name: openclaw 插件测试
        run: cd plugins/openclaw && pnpm install --frozen-lockfile && pnpm test

  web-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-all
      - name: 安装依赖
        run: cd web && pnpm install --frozen-lockfile
      - name: 类型检查
        run: cd web && pnpm typecheck
      - name: 单元测试
        run: cd web && pnpm test
      - name: 构建（vite）
        run: cd web && pnpm build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-all
      - name: ruff（backend + cli）
        # 用 backend 环境的 ruff 一次扫两处：ruff 是纯静态分析无需装 cli 依赖，
        # 且会按各自 pyproject 解析配置（cli 未把 ruff 列为依赖，故不能 cd cli && uv run ruff）。
        run: |
          cd backend && uv sync --all-packages
          uv run ruff check . "$GITHUB_WORKSPACE/cli"
      - name: 类型检查（openclaw 插件，tsc --noEmit）
        run: cd plugins/openclaw && pnpm install --frozen-lockfile && pnpm check
