# 安装链路每日冒烟：在干净 Ubuntu 容器跑 install.sh 的引导阶段，
# 确认 uv + Python 供给链和安装入口没坏。
#
# 范围说明：install.py 的深层阶段（Mi Home 账号绑定 / Omni 模型配置 / 感知模型下载）
# 需要真实凭证、大模型文件和交互，无法在 CI 跑——本冒烟只覆盖 bootstrap + 入口校验。
name: Install Smoke

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    timeout-minutes: 20
    steps:
      - name: 安装基础工具（模拟干净环境的最小前置）
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git

      - uses: actions/checkout@v5

      - name: install.sh 引导冒烟（装 uv + 供给 Python，校验入口可执行）
        run: bash scripts/install.sh -h
