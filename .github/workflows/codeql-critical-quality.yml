# CodeQL 质量分片扫描：按模块边界分成 python-shard / ts-shard 两片，
# 用内置 security-and-quality 套件。PR 上按 paths 只触发相关分片，另每日定时全跑。
# 复用 codeql.yml 的同一组 config（扫描范围一致，只换查询套件）。
name: CodeQL Quality

on:
  pull_request:
    paths:
      - "backend/**"
      - "cli/**"
      - "plugins/openclaw/**"
      - "web/**"
  schedule:
    - cron: "30 6 * * *"

concurrency:
  group: codeql-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  quality:
    name: Quality (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: python-shard
            language: python
            config: ./.github/codeql/codeql-python.yml
          - shard: ts-shard
            language: javascript-typescript
            config: ./.github/codeql/codeql-ts.yml
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ${{ matrix.config }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true # 未开 Code Scanning 时上传会失败；不阻塞（findings 不影响退出码）
        with:
          category: "/quality/${{ matrix.shard }}"
