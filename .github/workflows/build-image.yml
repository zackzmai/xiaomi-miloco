# 构建 PR Review 用镜像（gh + 审查 CLI）并推到 ghcr，供 pr-review workflow 当 container 用。
# 手动触发（Actions 页 Run workflow），或改动 Dockerfile.pr-review 时自动重建。
# 用 job 自带的 GITHUB_TOKEN 推送：org 包会自动 link 到本仓并授予本仓 Actions 拉取权限。
name: Build Review Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".ci/Dockerfile.pr-review"]

permissions:
  contents: read
  packages: write # push 到 ghcr

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .ci/Dockerfile.pr-review
          push: true
          tags: ghcr.io/xiaomi/xiaomi-miloco/pr-review:trixie
