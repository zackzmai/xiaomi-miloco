# PR AI 审查门禁：对同仓 PR 跑 /review-pr，把结果发成一条可更新的 PR 评论，
# 并按严重度阻断 merge。
# 审查方法论 + 评论格式见 .agents/commands/review-pr.md；本 workflow 只负责调度与门禁。
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# 同一 PR 连续 push 时取消上一次审查，只留最新
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # 发 / 改 review-pr-ci 评论
  statuses: write # 与 pr-review-command 一致：把结论打成同名 pr-review commit status（分支保护单条 required 名即可覆盖两条路）
  packages: read # 拉 ghcr 上的审查镜像

jobs:
  pr-review:
    # 只审同仓（非 fork）非草稿 PR：fork PR 拿不到 secrets，跳过避免无 key 空跑
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/xiaomi/xiaomi-miloco/pr-review:trixie
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      PR_AGENT_MODEL: ${{ vars.PR_AGENT_MODEL }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          # pull_request 默认 checkout 的是 merge ref（= 合并后状态，正合 review-pr 要求看到合并后代码）；
          # fetch-depth: 0 保留完整历史，供命令内的 git fetch origin main + merge-base 比对
          fetch-depth: 0

      # 容器内 GitHub 把 HOME 指到 /github/home，镜像里的 safe.directory 不生效，需在运行时 HOME 再设一次
      - name: 允许 git 访问工作区
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: AI 审查并按严重度门禁
        run: |
          git fetch origin main

          # 跑 base 分支上的共用审查+门禁脚本（与 pr-review-command.yml 同一份，单一来源：
          # BASE_URL 处理 / 命令文件准备 / pr-agent / 严重度正则都在脚本里，避免两个 workflow 各存一份漂移）。
          # 用 git show 取 base 版本而非当前 checkout，PR 改不动这段判定逻辑。脚本发现 🔴/🟡 时 exit 1。
          if git show origin/main:.ci/pr-review-gate.sh \
            | bash -s -- "${{ github.event.pull_request.number }}" "${{ github.repository }}"; then
            STATE=success
            DESC="未发现严重/重要问题"
          else
            STATE=failure
            DESC="发现严重/重要问题"
          fi

          # 与 pr-review-command 打同名 pr-review commit status，统一 merge 门禁信号；末行让 job 随严重度红/绿
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state="$STATE" -f context="pr-review" -f description="$DESC" >/dev/null

          [ "$STATE" = success ]
